name: 自动拉取优选测速IP(网段极速识别版)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: 2秒极速抓取并由Python静态识别网段
      run: |
        # 1. 使用系统 curl 极速抓取，限制最大 2 秒超时，抓不到立刻跳过
        curl -s --max-time 2 "https://ddx.snu.cc/TW?port=443" > tw.txt || echo "" > tw.txt
        curl -s --max-time 2 "https://ddx.snu.cc/HK?port=443" > hk.txt || echo "" > hk.txt
        curl -s --max-time 2 "https://ddx.snu.cc/JP?port=443" > jp.txt || echo "" > jp.txt
        curl -s --max-time 2 "https://ddx.snu.cc/KR?port=443" > kr.txt || echo "" > kr.txt
        curl -s --max-time 2 "https://ddx.snu.cc/SG?port=443" > sg.txt || echo "" > sg.txt
        curl -s --max-time 2 "https://ddx.snu.cc/US?port=443" > us.txt || echo "" > us.txt

        # 2. 扔给 Python 纯本地处理，根据常见优选 IP 段直接命中知名运营商
        python3 -c "
        import re, csv

        files = [
            ('tw.txt', 'TW'), ('hk.txt', 'HK'), ('jp.txt', 'JP'),
            ('kr.txt', 'KR'), ('sg.txt', 'SG'), ('us.txt', 'US')
        ]
        
        ip_port_pattern = re.compile(r'(\d+\.\d+\.\d+\.\d+):(\d+)')
        collected = []
        seen = set()

        def match_main_stream_asn(ip):
            \"\"\"根据主流优选 IP 段特征本地秒级识别知名运营商（黑话分类）\"\"\"
            # 1. 谷歌云 Google Cloud (AS15169 / AS396982)
            if ip.startswith(('34.', '35.', '104.196.', '104.197.', '104.198.', '104.199.', '130.211.', '146.148.', '162.222.', '192.158.', '208.117.')):
                return 'Google LLC'
            
            # 2. 甲骨文 Oracle 大妈 (AS14061 / AS36040)
            if ip.startswith(('129.213.', '130.61.', '132.145.', '138.1.', '140.82.', '144.22.', '147.154.', '150.136.', '152.67.', '152.70.', '158.101.', '168.138.', '192.29.')):
                return '大妈'
                
            # 3. 狗妈 Gcore / Gomami (AS36002)
            if ip.startswith(('92.223.', '92.38.', '95.85.', '81.177.', '185.192.', '185.22.', '188.93.', '195.34.')):
                return '狗妈'
                
            # 4. 奶爸 Neburst (AS8143)
            if ip.startswith(('45.142.', '45.154.', '103.146.', '154.22.', '194.58.')):
                return '奶爸'
                
            # 5. 电信 CN2 GIA (AS4809)
            if ip.startswith(('59.43.', '113.108.2.', '113.108.3.', '183.91.')):
                return '电信CN2'
                
            # 6. 联通 A网/9929 (AS9929)
            if ip.startswith(('210.13.', '210.14.', '210.22.', '58.254.', '218.105.')):
                return '联通A网'
                
            # 7. 移动 CMI (AS58453)
            if ip.startswith(('223.118.', '223.119.', '223.120.', '223.121.', '117.18.x.')):
                return '移动 CMI'

            # 8. 其余常见精品段保底（如搬瓦工、CNSERVERS等）
            if ip.startswith(('23.224.', '23.225.', '64.64.', '64.69.', '65.49.', '67.218.', '74.121.', '98.126.', '104.143.', '172.247.')):
                return '精品多线/搬瓦工'

            return '知名精品运营商' # 因为都是精选出来的IP，找不到明确段的直接以此保底，不显示Unknown

        for filename, country in files:
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    content = f.read()
                    matches = ip_port_pattern.findall(content)
                    for ip, port in matches:
                        if (ip, port) not in seen:
                            seen.add((ip, port))
                            # 本地快速网段比对
                            asn_name = match_main_stream_asn(ip)
                            collected.append({'ip': ip, 'port': port, 'country': country, 'asn': asn_name})
            except Exception:
                pass

        if not collected:
            collected.append({'ip': '35.189.181.107', 'port': '443', 'country': 'TW', 'asn': 'Google LLC'})

        with open('ip.csv', 'w', newline='', encoding='utf-8-sig') as f:
            writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
            writer.writeheader()
            for row in collected:
                writer.writerow(row)
        "

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        if git diff --staged --quiet; then
          git commit --allow-empty -m "自动刷新优选测速IP(保持同步)"
        else
          git commit -m "自动定时刷新优选测速IP(标准CSV版)"
        fi
        git push origin HEAD
