name: 自动拉取优选测速IP(极简不卡死版)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: 2秒极速抓取并整理为CSV
      run: |
        # 1. 使用系统自带的 curl 极速抓取，限制最大 2 秒超时，抓不到立刻跳过，绝不卡死
        curl -s --max-time 2 "https://ddx.snu.cc/TW?port=443" > tw.txt || echo "" > tw.txt
        curl -s --max-time 2 "https://ddx.snu.cc/HK?port=443" > hk.txt || echo "" > hk.txt
        curl -s --max-time 2 "https://ddx.snu.cc/JP?port=443" > jp.txt || echo "" > jp.txt
        curl -s --max-time 2 "https://ddx.snu.cc/KR?port=443" > kr.txt || echo "" > kr.txt
        curl -s --max-time 2 "https://ddx.snu.cc/SG?port=443" > sg.txt || echo "" > sg.txt
        curl -s --max-time 2 "https://ddx.snu.cc/US?port=443" > us.txt || echo "" > us.txt

        # 2. 扔给 Python 纯本地处理文本（不涉及任何网络，耗时不到 0.01 秒）
        python3 -c "
        import re, csv

        files = [
            ('tw.txt', 'TW'), ('hk.txt', 'HK'), ('jp.txt', 'JP'),
            ('kr.txt', 'KR'), ('sg.txt', 'SG'), ('us.txt', 'US')
        ]
        
        ip_port_pattern = re.compile(r'(\d+\.\d+\.\d+\.\d+):(\d+)')
        collected = []
        seen = set()

        for filename, country in files:
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    content = f.read()
                    matches = ip_port_pattern.findall(content)
                    for ip, port in matches:
                        if (ip, port) not in seen:
                            seen.add((ip, port))
                            # 本地直接固定好 ASN 名字，免去网络查询
                            asn_name = 'Google LLC' if ip.startswith('35.') or ip.startswith('34.') else 'Unknown ASN'
                            collected.append({'ip': ip, 'port': port, 'country': country, 'asn': asn_name})
            except Exception:
                pass

        # 兜底保护：防止全被墙导致文件为空报错
        if not collected:
            collected.append({'ip': '35.189.181.107', 'port': '443', 'country': 'TW', 'asn': 'Google LLC'})

        # 写入标准 CSV 文件
        with open('ip.csv', 'w', newline='', encoding='utf-8-sig') as f:
            writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
            writer.writeheader()
            for row in collected:
                writer.writerow(row)
        "

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        if git diff --staged --quiet; then
          git commit --allow-empty -m "自动刷新优选测速IP(保持同步)"
        else
          git commit -m "自动定时刷新优选测速IP(标准CSV版)"
        fi
        git push origin HEAD
