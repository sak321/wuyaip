name: 自动拉取优选测速IP(细化ASN网段版)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: write-all

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: 2秒极速抓取并静态细化识别ASN
      run: |
        # 1. 抓取文本，保持绝对防卡死机制
        curl -s --max-time 2 "https://ddx.snu.cc/TW?port=443" > tw.txt || echo "" > tw.txt
        curl -s --max-time 2 "https://ddx.snu.cc/HK?port=443" > hk.txt || echo "" > hk.txt
        curl -s --max-time 2 "https://ddx.snu.cc/JP?port=443" > jp.txt || echo "" > jp.txt
        curl -s --max-time 2 "https://ddx.snu.cc/KR?port=443" > kr.txt || echo "" > kr.txt
        curl -s --max-time 2 "https://ddx.snu.cc/SG?port=443" > sg.txt || echo "" > sg.txt
        curl -s --max-time 2 "https://ddx.snu.cc/US?port=443" > us.txt || echo "" > us.txt

        # 2. Python 本地极速细化网段特征比对
        python3 -c "
        import re, csv

        files = [
            ('tw.txt', 'TW'), ('hk.txt', 'HK'), ('jp.txt', 'JP'),
            ('kr.txt', 'KR'), ('sg.txt', 'SG'), ('us.txt', 'US')
        ]
        
        ip_port_pattern = re.compile(r'(\d+\.\d+\.\d+\.\d+):(\d+)')
        collected = []
        seen = set()

        def get_refined_asn(ip):
            \"\"\"深度细化主流云厂商与精品机房 IP 段特征匹配\"\"\"
            
            # 1. Cloudflare (直接标出，不做细化处理)
            if ip.startswith(('104.16.', '104.17.', '104.18.', '104.19.', '104.20.', '104.21.', '172.64.', '172.65.', '172.66.', '172.67.', '172.68.', '172.69.', '172.70.', '172.71.', '162.158.', '188.114.')):
                return 'Cloudflare'

            # 2. 谷歌云 Google Cloud (GCP)
            if ip.startswith(('34.', '35.', '104.196.', '104.197.', '104.198.', '104.199.', '130.211.', '146.148.', '162.222.', '192.158.', '208.117.')):
                return 'Google Cloud'
            
            # 3. 甲骨文 Oracle (大妈)
            if ip.startswith(('129.213.', '130.61.', '132.145.', '138.1.', '140.82.', '144.22.', '147.154.', '150.136.', '152.67.', '152.70.', '158.101.', '168.138.', '192.29.', '193.122.', '193.123.')):
                return 'Oracle 大妈'
                
            # 4. Gcore (狗妈)
            if ip.startswith(('92.223.', '92.38.', '95.85.', '81.177.', '185.192.', '185.22.', '188.93.', '195.34.')):
                return 'Gcore 狗妈'
                
            # 5. Neburst (奶爸)
            if ip.startswith(('45.142.', '45.154.', '103.146.', '154.22.', '194.58.')):
                return 'Neburst 奶爸'
            
            # 6. AWS 亚马逊云
            if ip.startswith(('3.', '13.', '15.', '18.', '52.', '54.')):
                return 'AWS 亚马逊'
                
            # 7. Microsoft Azure 微软云
            if ip.startswith(('20.', '40.', '65.', '104.40.', '104.41.', '104.42.', '104.43.', '104.44.', '104.45.', '104.46.', '104.47.')):
                return 'Azure 微软云'

            # 8. DigitalOcean (经典大水管)
            if ip.startswith(('104.131.', '104.236.', '138.197.', '159.203.', '162.243.', '192.241.', '167.71.', '167.99.', '206.189.', '178.128.')):
                return 'DigitalOcean'

            # 9. Vultr
            if ip.startswith(('45.32.', '45.76.', '104.156.', '108.61.', '149.28.', '207.148.', '216.239.', '155.138.', '104.207.', '104.238.')):
                return 'Vultr'

            # 10. Linode / Akamai
            if ip.startswith(('45.33.', '45.79.', '50.116.', '139.162.', '172.104.', '172.105.', '173.255.', '192.155.', '198.58.', '66.228.')):
                return 'Linode (Akamai)'

            # 11. 搬瓦工 BandwagonHost / IT7
            if ip.startswith(('23.224.', '23.225.', '64.64.', '64.69.', '65.49.', '67.218.', '74.121.', '98.126.', '104.143.', '172.247.', '162.24.')):
                return '搬瓦工 IT7'
                
            # 12. Misaka 御坂网络
            if ip.startswith(('152.53.', '194.50.')):
                return 'Misaka 御坂'

            # 13. 中国电信 CN2 GIA
            if ip.startswith(('59.43.', '113.108.', '183.91.', '118.89.', '101.226.', '61.129.')):
                return '电信 CN2'
                
            # 14. 联通 9929 / A网
            if ip.startswith(('210.13.', '210.14.', '210.22.', '58.254.', '218.105.', '219.158.')):
                return '联通 9929'
                
            # 15. 移动 CMI
            if ip.startswith(('223.118.', '223.119.', '223.120.', '223.121.', '117.18.')):
                return '移动 CMI'

            return '知名精品机房' # 其他未能匹配到精确特征段的优选节点

        for filename, country in files:
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    content = f.read()
                    matches = ip_port_pattern.findall(content)
                    for ip, port in matches:
                        if (ip, port) not in seen:
                            seen.add((ip, port))
                            # 传入函数，打上细分标签
                            asn_name = get_refined_asn(ip)
                            collected.append({'ip': ip, 'port': port, 'country': country, 'asn': asn_name})
            except Exception:
                pass

        if not collected:
            collected.append({'ip': '35.189.181.107', 'port': '443', 'country': 'TW', 'asn': 'Google Cloud'})

        with open('ip.csv', 'w', newline='', encoding='utf-8-sig') as f:
            writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
            writer.writeheader()
            for row in collected:
                writer.writerow(row)
        "

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        if git diff --staged --quiet; then
          git commit --allow-empty -m "自动刷新优选测速IP(保持同步)"
        else
          git commit -m "自动定时刷新优选测速IP(细化ASN版)"
        fi
        git push origin HEAD
