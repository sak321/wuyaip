name: 自动拉取优选测速IP(标准CSV版)

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动刷新
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import re
        import csv
        import urllib.request

        def collect_and_generate_csv():
            # 6 个国家的 API 接口及国家标识
            url_configs = [
                {'url': 'https://ddx.snu.cc/TW?port=443', 'country': 'TW'},
                {'url': 'https://ddx.snu.cc/HK?port=443', 'country': 'HK'},
                {'url': 'https://ddx.snu.cc/JP?port=443', 'country': 'JP'},
                {'url': 'https://ddx.snu.cc/KR?port=443', 'country': 'KR'},
                {'url': 'https://ddx.snu.cc/SG?port=443', 'country': 'SG'},
                {'url': 'https://ddx.snu.cc/US?port=443', 'country': 'US'}
            ]

            # 正则：精准捕获文本中的 IP 和 端口
            ip_port_pattern = re.compile(r'([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+)')
            
            collected_rows = []
            seen_ips = set()

            request_headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            }

            for config in url_configs:
                try:
                    req = urllib.request.Request(config['url'], headers=request_headers)
                    with urllib.request.urlopen(req, timeout=8) as response:
                        text = response.read().decode('utf-8')
                        matches = ip_port_pattern.findall(text)
                        
                        for ip, port in matches:
                            if (ip, port) not in seen_ips:
                                seen_ips.add((ip, port))
                                
                                # 识别并标注对应的 ASN/运营商信息
                                if ip.startswith('35.') or ip.startswith('34.'):
                                    asn_name = "AS15169 Google LLC"
                                else:
                                    asn_name = "Unknown ASN"
                                    
                                # 组织字典结构：ip 和 port 强制排在 CSV 的前两列
                                collected_rows.append({
                                    'ip': ip,
                                    'port': port,
                                    'country': config['country'],
                                    'asn': asn_name
                                })
                except Exception as e:
                    print(f"请求接口失败 [{config['url']}]: {e}")

            # 极端情况兜底机制（防止生成空文件导致测速软件报错）
            if not collected_rows:
                collected_rows.append({
                    'ip': '35.189.181.107',
                    'port': '443',
                    'country': 'TW',
                    'asn': 'AS15169 Google LLC'
                })

            # 固定生成名为 ip.csv 的文件
            output_filename = "ip.csv"
            
            # 使用 utf-8-sig 编码，确保用 Excel 或其他测速工具打开时绝对不会因为中文或格式错乱
            with open(output_filename, 'w', newline='', encoding='utf-8-sig') as f:
                # 定义 CSV 的表头，前两列严格锁定为 ip, port
                writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
                writer.writeheader()  # 写入首行表头
                for row in collected_rows:
                    writer.writerow(row) # 逐行写入逗号分隔的测速数据
                    
            print(f"CSV文件生成成功，共筛选并去重导出 {len(collected_rows)} 个测速节点。")

        if __name__ == "__main__":
            collect_and_generate_csv()
        EOF
        python temp_script.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        git commit --allow-empty -m "自动定时刷新优选测速IP(CSV格式)"
        git push origin HEAD
