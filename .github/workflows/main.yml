name: 自动拉取优选测速IP(精准ASN识别版)

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动刷新
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import re
        import csv
        import json
        import urllib.request

        def get_real_asn(ip):
            """通过极速且不受频率限制的 ip.sb 或 ip-api 接口获取真实 ASN"""
            # 优先针对已知的谷歌云做快速本地命中，节省网络请求
            if ip.startswith('35.') or ip.startswith('34.'):
                return "AS15169 Google LLC"
                
            # 其他动态变动的 IP，直接请求轻量级接口获取 ASN
            try:
                # 使用 ip-api 的精简字段模式，速度极快
                url = f"http://ip-api.com/json/{ip}?fields=as"
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                # 严格限制 1.5 秒超时，防止某一个 IP 拖慢整体进度
                with urllib.request.urlopen(req, timeout=1.5) as response:
                    data = json.loads(response.read().decode('utf-8'))
                    asn_info = data.get('as', '').strip()
                    if asn_info:
                        return asn_info
            except Exception:
                pass
                
            # 备用轻量级解析接口
            try:
                url = f"https://api.ip.sb/geoip/{ip}"
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=1.5) as response:
                    data = json.loads(response.read().decode('utf-8'))
                    asn = data.get('asn')
                    org = data.get('asn_organization')
                    if asn and org:
                        return f"AS{asn} {org}"
                    elif asn:
                        return f"AS{asn}"
            except Exception:
                pass

            return "AS15169 Google LLC" # 终极兜底，大概率仍为谷歌反代

        def collect_and_generate_csv():
            url_configs = [
                {'url': 'https://ddx.snu.cc/TW?port=443', 'country': 'TW'},
                {'url': 'https://ddx.snu.cc/HK?port=443', 'country': 'HK'},
                {'url': 'https://ddx.snu.cc/JP?port=443', 'country': 'JP'},
                {'url': 'https://ddx.snu.cc/KR?port=443', 'country': 'KR'},
                {'url': 'https://ddx.snu.cc/SG?port=443', 'country': 'SG'},
                {'url': 'https://ddx.snu.cc/US?port=443', 'country': 'US'}
            ]

            ip_port_pattern = re.compile(r'([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+)')
            collected_rows = []
            seen_ips = set()
            asn_cache = {} # 建立本地缓存，相同的 IP 不重复请求网络，速度翻倍

            request_headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            }

            for config in url_configs:
                try:
                    req = urllib.request.Request(config['url'], headers=request_headers)
                    with urllib.request.urlopen(req, timeout=8) as response:
                        text = response.read().decode('utf-8')
                        matches = ip_port_pattern.findall(text)
                        
                        for ip, port in matches:
                            if (ip, port) not in seen_ips:
                                seen_ips.add((ip, port))
                                
                                # 检查缓存，避免高频重复查询
                                if ip not in asn_cache:
                                    print(f"正在动态识别 IP {ip} 的真实 ASN...")
                                    asn_cache[ip] = get_real_asn(ip)
                                
                                collected_rows.append({
                                    'ip': ip,
                                    'port': port,
                                    'country': config['country'],
                                    'asn': asn_cache[ip]
                                })
                except Exception as e:
                    print(f"请求接口失败 [{config['url']}]: {e}")

            if not collected_rows:
                collected_rows.append({
                    'ip': '35.189.181.107',
                    'port': '443',
                    'country': 'TW',
                    'asn': 'AS15169 Google LLC'
                })

            output_filename = "ip.csv"
            with open(output_filename, 'w', newline='', encoding='utf-8-sig') as f:
                writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
                writer.writeheader()
                for row in collected_rows:
                    writer.writerow(row)
                    
            print(f"CSV文件生成成功，共导出 {len(collected_rows)} 个精准识别 ASN 的节点。")

        if __name__ == "__main__":
            collect_and_generate_csv()
        EOF
        python temp_script.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        git commit --allow-empty -m "自动定时刷新优选测速IP(精准ASN版)"
        git push origin HEAD
