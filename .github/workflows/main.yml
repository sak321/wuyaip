name: 自动拉取优选测速IP(知名运营商白名单版)

on:
  schedule:
    - cron: '0 0 * * *' # 每天自动刷新
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import re
        import csv
        import json
        import urllib.request

        def get_ip_asn_number(ip):
            """极速获取 IP 的 ASN 数字编号，用于白名单比对"""
            # 针对最常见的谷歌云做本地高频硬编码命中，节省网络请求
            if ip.startswith('35.') or ip.startswith('34.'):
                return 15169 # 对应 Google LLC，后续会自动转换为知名运营商名字
                
            # 其他动态 IP 走极速 API 探测
            try:
                url = f"http://ip-api.com/json/{ip}?fields=as"
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=1.5) as response:
                    data = json.loads(response.read().decode('utf-8'))
                    as_str = data.get('as', '') # 格式通常为 "AS15169 Google LLC"
                    match = re.search(r'AS(\d+)', as_str)
                    if match:
                        return int(match.group(1))
            except Exception:
                pass
                
            try:
                url = f"https://api.ip.sb/geoip/{ip}"
                req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=1.5) as response:
                    data = json.loads(response.read().decode('utf-8'))
                    asn = data.get('asn')
                    if asn:
                        return int(asn)
            except Exception:
                pass

            return None

