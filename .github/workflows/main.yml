name: 自动收集优选测速 IP (带国家与ASN)

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次
  workflow_dispatch: # 支持手动点击触发

jobs:
  collect_ips:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装基础依赖
      run: |
        pip install requests

    - name: 请求 API 并生成复合测速 CSV
      run: |
        python -c "
        import requests
        import re
        import csv

        urls = [
            'https://ddx.snu.cc/TW?port=443',
            'https://ddx.snu.cc/HK?port=443',
            'https://ddx.snu.cc/JP?port=443',
            'https://ddx.snu.cc/KR?port=443',
            'https://ddx.snu.cc/SG?port=443',
            'https://ddx.snu.cc/US?port=443'
        ]

        # 正则表达式：精准匹配 IP 和 端口
        ip_port_pattern = re.compile(r'([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+)')
        
        collected_data = []
        seen = set()

        for url in urls:
            try:
                response = requests.get(url, timeout=15)
                if response.status_code == 200:
                    text = response.text
                    matches = ip_port_pattern.findall(text)
                    
                    for ip, port in matches:
                        if (ip, port) not in seen:
                            seen.add((ip, port))
                            
                            # 默认国家和ASN，如果在线API没查到则作为保底
                            country = '未知'
                            asn = '未知运营商'
                            
                            # 通过公网免密 API 动态获取该 IP 的国家和 ASN
                            try:
                                geo_res = requests.get(f'http://ip-api.com/json/{ip}?fields=status,country,as', timeout=5)
                                if geo_res.status_code == 200:
                                    geo_data = geo_res.json()
                                    if geo_data.get('status') == 'success':
                                        country = geo_data.get('country', '未知')
                                        asn = geo_data.get('as', '未知运营商')
                            except Exception as geo_err:
                                print(f'查询 IP {ip} 归属地失败: {geo_err}')
                                # 针对 35.189.181.107 做硬编码校准保底
                                if ip == '35.189.181.107':
                                    country = '台湾 (Taiwan)'
                                    asn = 'AS15169 Google LLC'
                            
                            collected_data.append({
                                'ip': ip,
                                'port': port,
                                'country': country,
                                'asn': asn
                            })
            except Exception as e:
                print(f'请求失败 {url}: {e}')

        # 保底机制
        if not collected_data:
            collected_data = [{
                'ip': '35.189.181.107',
                'port': '443',
                'country': '台湾 (Taiwan)',
                'asn': 'AS15169 Google LLC'
            }]

        # 写入 CSV（保持 ip 和 port 在前两列，确保测速工具能够正常切分）
        with open('ip.csv', 'w', newline='', encoding='utf-8-sig') as f:
            writer = csv.DictWriter(f, fieldnames=['ip', 'port', 'country', 'asn'])
            writer.writeheader()
            for row in collected_data:
                writer.writerow(row)

        print(f'成功收集到 {len(collected_data)} 个带归属地信息的测速 IP。')
        "

    - name: 自动提交更新到仓库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add ip.csv
        git diff --staged --quiet || (git commit -m "自动更新测速 IP 列表(带归属地) [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]" && git push)
